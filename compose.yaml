# ── To-Do List — Docker Compose ──────────────────────────────────────────────
# Jalankan : docker compose up -d
# Hentikan : docker compose down
# Lihat log : docker compose logs -f
# Buka      : http://localhost:969
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Pilih SALAH SATU service di bawah ──────────────────────────────────────
  # Uncomment service yang diinginkan, comment sisanya.
  # Default: Python
  # ───────────────────────────────────────────────────────────────────────────

  # ── Python (default) ────────────────────────────────────────────────────────
  todo:
    build:
      context: .
      dockerfile: Dockerfile        # pastikan Dockerfile memakai blok Python
    container_name: todo-app
    ports:
      - "969:969"
    volumes:
      - ./todo.txt:/app/todo.txt    # data tetap tersimpan di host
    restart: unless-stopped

